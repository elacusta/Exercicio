name: Android Build

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK cmdline-tools
        uses: android-actions/setup-android@v4
        with:
          cmdline-tools-version: 'latest'
          accept-android-sdk-licenses: true

      - name: Install SDK packages with sdkmanager
        run: |
          export ANDROID_SDK_ROOT=/usr/local/lib/android/sdk
          /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager --sdk_root=${ANDROID_SDK_ROOT} "platform-tools" "platforms;android-34" "build-tools;34.0.0"
        shell: bash

      - name: Set up Gradle
        uses: gradle/gradle-build-action@v2
        with:
          gradle-version: 8.2.1

      - name: Build debug APK
        run: gradle :app:assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: kegel-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
